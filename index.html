<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSPEN Kedah Monitoring Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --bg-body: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body); 
            color: #1e293b;
        }

        .sidebar { 
            background: var(--primary-color); 
            min-height: 100vh; 
            color: white;
            padding-top: 20px;
        }

        .nav-link { 
            color: #94a3b8; 
            padding: 12px 20px;
            border-radius: 8px;
            margin: 5px 15px;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active { 
            color: white; 
            background: rgba(255,255,255,0.1); 
        }

        .card-stat { 
            border: none; 
            border-radius: 16px; 
            padding: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .card-stat:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }

        .table-container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        .badge-aktif { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <span class="ms-3">Memuatkan Data KOSPEN...</span>
</div>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar">
            <div class="text-center mb-4">
                <i class="fas fa-heartbeat fa-3x text-info mb-2"></i>
                <h5 class="fw-bold">KOSPEN KEDAH</h5>
            </div>
            <ul class="nav flex-column mt-4">
                <li class="nav-item"><a href="#" class="nav-link active"><i class="fas fa-chart-line me-2"></i> Utama</a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-map-marked-alt me-2"></i> Lokaliti</a></li>
                <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-users me-2"></i> Penyelaras</a></li>
            </ul>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Dashboard Pemantauan</h2>
                <span class="text-muted"><i class="far fa-calendar-alt"></i> Kemaskini Automatik</span>
            </div>

            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="card card-stat bg-white">
                        <div class="d-flex align-items-center">
                            <div class="p-3 bg-primary bg-opacity-10 rounded-3 me-3">
                                <i class="fas fa-hospital-user fa-2x text-primary"></i>
                            </div>
                            <div>
                                <h6 class="text-muted mb-0">Jumlah Lokaliti</h6>
                                <h2 class="fw-bold mb-0" id="stat-total">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-stat bg-white">
                        <div class="d-flex align-items-center">
                            <div class="p-3 bg-success bg-opacity-10 rounded-3 me-3">
                                <i class="fas fa-check-circle fa-2x text-success"></i>
                            </div>
                            <div>
                                <h6 class="text-muted mb-0">Lokaliti Aktif</h6>
                                <h2 class="fw-bold mb-0" id="stat-aktif">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-stat bg-white">
                        <div class="d-flex align-items-center">
                            <div class="p-3 bg-warning bg-opacity-10 rounded-3 me-3">
                                <i class="fas fa-user-friends fa-2x text-warning"></i>
                            </div>
                            <div>
                                <h6 class="text-muted mb-0">Sukarelawan</h6>
                                <h2 class="fw-bold mb-0" id="stat-vol">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <h5 class="fw-bold mb-4">Pangkalan Data Lokaliti</h5>
                <table id="mainTable" class="table table-hover w-100">
                    <thead>
                        <tr>
                            <th>DAERAH</th>
                            <th>NAMA LOKALITI</th>
                            <th>TAHUN DITUBUHKAN</th>
                            <th>PENGERUSI</th>
                            <th>STATUS</th>
                            <th>TINDAKAN</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 1. GANTIKAN URL DI BAWAH DENGAN WEB APP URL ANDA
    const apiURL = "https://script.google.com/macros/s/AKfycbw97VncStR9RCtcwnnNPh-ZH6mBfr_ypLO3DhAt6-wsb4xVfxn7_THogpUC7gRDollnFw/exec";

    async function loadData() {
        try {
            const response = await fetch(apiURL);
            const data = await response.json();
            
            // Update Statistik
            document.getElementById('stat-total').innerText = data.length;
            const aktifCount = data.filter(item => item["STATUS"] === "AKTIF").length;
            document.getElementById('stat-aktif').innerText = aktifCount;
            
            // Kira Jumlah Sukarelawan (Pastikan header di Sheet adalah 'BIL SUKARELAWAN')
            const totalVol = data.reduce((sum, item) => sum + (Number(item["BIL SUKARELAWAN"]) || 0), 0);
            document.getElementById('stat-vol').innerText = totalVol;

            // Initialize DataTable
            $('#mainTable').DataTable({
                data: data,
                columns: [
                    { data: 'DAERAH' },
                    { data: 'NAMA LOKALITI' },
                    { data: 'TAHUN DITUBUHKAN' },
                    { data: 'NAMA PENGERUSI' },
                    { 
                        data: 'STATUS',
                        render: function(val) {
                            let badgeClass = val === 'AKTIF' ? 'badge-aktif' : 'bg-light text-muted';
                            return `<span class="badge ${badgeClass} px-3 py-2">${val}</span>`;
                        }
                    },
                    { 
                        data: null,
                        render: function(row) {
                            return `<button class="btn btn-sm btn-outline-primary shadow-sm" onclick="alert('Profil: ${row['NAMA LOKALITI']}')">Detail</button>`;
                        }
                    }
                ],
                responsive: true,
                language: {
                    url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ms.json"
                }
            });

            document.getElementById('loader').style.display = 'none';

        } catch (error) {
            console.error("Gagal memuatkan data:", error);
            alert("Ralat memuatkan data. Sila pastikan URL API betul.");
        }
    }

    $(document).ready(function() {
        loadData();
    });
</script>

</body>
</html>
